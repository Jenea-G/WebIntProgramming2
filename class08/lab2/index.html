<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 - Evgeniya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="script.js" type="module"></script>
</head>

<body>
    <main>
        <section class="py-5 bg-success text-white">
            <div class="container">
                <h1 class="display-5 fw-bold text-center">Lab 2</h1>
                <p class="lead">A small dashboard that loads users from an external API and displays related posts for
                    each
                    user.</p>
            </div>
        </section>
        <section class="py-5">
            <div class="container">
                <h2 class="mb-3">Users Dashboard</h2>
                <button class="btn btn-success me-1" id="load-users">Load Users</button>
                <button class="btn btn-outline-success" id="clear-data">Clear Data</button>
                <p class="alert alert-secondary my-3" id="status-msg">Ready to load user.</p>
                <div class="row" id="cards-holder">
                </div>
            </div>
        </section>
    </main>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
