<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="app.js" type="module"></script>
</head>

<body>
    <main>
        <section class="py-5 text-center">
            <div class="container">
                <h1 class="display-2 text-secondary fw-bold">
                    Arcade Tournament Dashboard
                </h1>
                <p>This is a small JavaScript web application that loads and displays arcade tournaments and their
                    related
                    player registrations.</p>
            </div>
        </section>

        <section class="py-5">
            <div class="container">
                <h2 class="display-4 text-secondary fw-bold">Tournaments</h2>
                <div class="py-2">
                    <button class="btn btn-secondary me-2" id="load">Load Tournaments</button>
                    <button class="btn btn-outline-secondary" id="clear">Clear</button>
                </div>
                <p class="status py-2 alert alert-secondary" id="status">Press button to load tournaments</p>
                <div class="row py-2" id="content">

                </div>
            </div>
        </section>

        <section class="py-3">
            <div class="container">
                <h3 class="display-6 text-secondary fw-bold">Registration details</h2>
                    <p class="my-1 alert alert-secondary" id="status-reg"></p>
                    <div class="my-2" id="summary"></div>

                    <div class="row" id="details">

                    </div>
            </div>

        </section>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
