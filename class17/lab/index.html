<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Dashboard</title>
    <script type="module" src="app.js"></script>
    <!-- <script type="module" src="team-card.js"></script> -->
    <style>
        #teams-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>World Cup Dashboard</h1>
        <p id="status">Click the button to load teams.</p>

        <button id="load-btn">Load Teams</button>
        <button id="clear-btn">Clear</button>

        <section>
            <h2>Teams</h2>
            <div id="teams-container">
                <!-- <team-card name="Abc" group="B" points="3" played="2" goal-difference="5"></team-card>
                <team-card name="Abc" group="B" points="3" played="2" goal-difference="5"></team-card>
                <team-card name="Abc" group="B" points="3" played="2" goal-difference="5"></team-card> -->
            </div>

            <section>
                <h2>Selected Team</h2>
                <p id="detail-status">No team selected yet.</p>
                <div id="details-container">

                </div>
            </section>
    </main>

</body>

</html>
