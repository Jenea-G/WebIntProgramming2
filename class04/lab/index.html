<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Loader</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" type="module"></script>

</head>

<body>
    <section>
        <div class="container">
            <h1>Student Profile Loader</h1>

            <div class="controls">
                <button id="load-student-btn">Load Student</button>
                <button id="load-courses-btn">Load Courses</button>
                <button id="clear-btn">Clear</button>
            </div>

            <p id="status">Ready.</p>

            <div class="data">
                <section id="student-container">
                </section>
                <section id="courses-container">
                </section>
            </div>

        </div>
    </section>
</body>

</html>
